services:
  db:
    image: mysql:8.0
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-student_management}
      MYSQL_USER: ${DB_USER:-student_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-student_pass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  web:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-student_management}
      DB_USER: ${DB_USER:-student_app}
      DB_PASSWORD: ${DB_PASSWORD:-student_pass}
      SECRET_KEY: ${SECRET_KEY:-student-management-secret-key}
      APP_PORT: 5000
      DEBUG: "false"
      DB_CONNECT_RETRIES: "60"
      DB_CONNECT_DELAY_SECONDS: "2"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

volumes:
  db_data:
