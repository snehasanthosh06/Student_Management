services:
  db:
    image: mysql:8.0
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-student_management}
      MYSQL_USER: ${DB_USER:-student_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-student_pass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"

  web:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-student_management}
      DB_USER: ${DB_USER:-student_app}
      DB_PASSWORD: ${DB_PASSWORD:-student_pass}
      SECRET_KEY: ${SECRET_KEY:-student-management-secret-key}
      APP_PORT: 5000
      DEBUG: "false"
    depends_on:
      - db
    ports:
      - "5000:5000"

volumes:
  db_data:
